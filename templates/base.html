<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Map Points{% endblock %}</title>
    <link
        rel="stylesheet"
        href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
        crossorigin="anonymous"
    />
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; }
        nav { background: #2c3e50; padding: 12px 20px; display: flex; gap: 20px; }
        nav a { color: #ecf0f1; text-decoration: none; font-size: 15px; }
        nav a:hover { text-decoration: underline; }
        main { padding: 20px; }
    </style>
    {% block extra_head %}{% endblock %}
</head>
<body>
    <nav>
        <a href="{% url 'map' %}">Map</a>
        <a href="{% url 'points' %}">Points List</a>
    </nav>
    <main>
        {% block content %}{% endblock %}
    </main>
    <script
        src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
        integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
        crossorigin="anonymous"
    ></script>
    {% block extra_scripts %}{% endblock %}
</body>
</html>
